<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 11 Project</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <button id="mem1-button">Memory #1</button>
    <button id="mem2-button">Memory #2</button>
    <button id="mem3-button">Memory #3</button>
    <h1>My Top 3 Memories of <span>This Year</span></h1>
    <div class="center">
    <ol>
      <li>
        <h3 id="mem1">Memory #1</h3>
        <p>More about this memory.</p>
        <img class="Concert1" 
        src="https://soundchecksf.com/wp-content/uploads/2025/03/tylerthecreator_oakland_022425-27-copy.jpg"
        width="250">
      </li>

      <li>
        <h3 id="mem2">Memory #2</h3>
        <p>More about this memory.</p>
        <img class="movie1"
        src="https://m.media-amazon.com/images/M/MV5BYjg1Mjc3MjQtMTZjNy00YWVlLWFhMWEtMWI3ZTgxYjJmNmRlXkEyXkFqcGc@._V1_FMjpg_UX1000_.jpg"
        height="350">
        <img class="movie2" 
        src="https://dtrasler.com/wp-content/uploads/2025/07/jw-rebirth-2.jpg"
        height="350">
        <img class="movie3"
        src="https://m.media-amazon.com/images/I/81mpYNTj6SL._UF1000,1000_QL80_.jpg"
        height="350">
      </li>

      <li>
        <h3 id="mem3">Memory #3</h3>
        <p>More about this memory</p>
        <img class="Miami1"
        src="https://i.guim.co.uk/img/media/edccd4a1a99f26f6636c9a178a4d6d75f7b5700d/83_0_5827_3500/master/5827.jpg?width=445&dpr=1&s=none&crop=none"
        height="250">
        <img class="Miami2"
        src="https://img1.wsimg.com/isteam/ip/7dfc2335-dfac-4ff8-8490-91000cef58e3/35C1A9E3-413A-42EA-B605-F81879B7AEA5.jpeg"
        height="250">

      </li>
    </ol>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>

      // ======================== Button #1
      var mem1count = 0;

      $("#mem1-button").click(function () {
        if(mem1count==0){
        $("#mem1").css("color", "Brown");
       
        $("#mem1").text("First Concert!");
        $(".Concert1").show(1000);
        mem1count = 1;
        }
        else if(mem1count==1){
        $("#mem1").css("color", "black");
        $("#mem1").text("Memory #1");
       
         $(".Concert1").hide();
        mem1count = 0;
        }
      });

      // ======================== Button #2
       var mem2count = 0;
        
      $("#mem2-button").click(function () {
         if(mem2count==0){
        $("#mem2").css("color", "brown");
        $("#mem2").text("Movies!");
        $(".movie1").show(1000)
        $(".movie2").show(1000)
        $(".movie3").show(1000)
        mem2count = 1;
         }
         else if(mem2count==1){
        $("#mem2").css("color", "black");
        $("#mem2").text("Memory #2");
        $(".movie1").hide()
        $(".movie2").hide()
        $(".movie3").hide()
        mem2count = 0;
        }
      });
    

      // ======================== Button #3
      var mem3count = 0;
        

      $("#mem3-button").click(function () {
        if(mem3count==0){
        $("#mem3").css("color", "brown");
        $("#mem3").text("Miami!");
        $(".Miami1").show(1000)
        $(".Miami2").show(1000)
         mem3count = 1;
         }
         else if(mem3count==1){
        $("#mem3").css("color", "black");
        $("#mem3").text("Memory #3");
        $(".Miami1").hide()
        $(".Miami2").hide()
        mem3count = 0;
        }
      });


    </script>
  </body>
</html>
